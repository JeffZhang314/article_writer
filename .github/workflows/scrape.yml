name: Scrape x

on:
  schedule:
    - cron: '55 22 * * *'  # 3:55 PM PDT (UTC-7) = 22:55 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright lxml
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        run: python x_scraper.py

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x_posts.json
          git diff --cached --quiet || git commit -m "chore: update x posts"
          git push